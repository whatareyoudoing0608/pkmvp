version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.fe
    container_name: pkmvp-frontend
    ports:
      - "8085:80"
    environment:
      - NGINX_PORT=80
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pkmvp-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.be
    container_name: pkmvp-backend
    ports:
      - "8084:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
    volumes:
      - ./appsettings.production.json:/app/appsettings.Production.json:ro
    restart: unless-stopped
    networks:
      - pkmvp-network

networks:
  pkmvp-network:
    driver: bridge
